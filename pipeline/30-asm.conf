# ---------------------------------------------------------------------------
# 30-asm.conf — ASM (Application Security Manager / WAF) events
#
# ASM events carry a rich, well-defined field set. We split the comma-delimited
# multi-value fields into arrays for easier querying in Azure Log Analytics and
# coerce the numeric fields.
# ---------------------------------------------------------------------------

filter {
  if [@metadata][f5_category] == "ASM" {

    # ---- Split multi-value fields into arrays --------------------------
    # F5 packs several attributes as comma-separated strings. Guard each split
    # so empty strings ("N/A" placeholders excluded) don't create [""] arrays.
    if [violations]     and [violations]     != "" { mutate { split => { "violations"     => "," } } }
    if [sub_violations] and [sub_violations] != "" { mutate { split => { "sub_violations" => "," } } }
    if [attack_type]    and [attack_type]    != "" { mutate { split => { "attack_type"    => "," } } }
    if [sig_ids]        and [sig_ids]        != "" { mutate { split => { "sig_ids"        => "," } } }
    if [sig_names]      and [sig_names]      != "" { mutate { split => { "sig_names"       => "," } } }
    if [staged_sig_ids] and [staged_sig_ids] != "" { mutate { split => { "staged_sig_ids" => "," } } }

    # ---- Numeric coercions --------------------------------------------
    mutate {
      convert => {
        "violation_rating" => "integer"
        "response_code"    => "integer"
        "src_port"         => "integer"
        "dest_port"        => "integer"
        "route_domain"     => "integer"
      }
    }

    # ---- Event timestamp ----------------------------------------------
    # ASM emits `date_time` as "yyyy-MM-dd HH:mm:ss" in the device's timezone.
    if [date_time] {
      date {
        match        => [ "date_time", "yyyy-MM-dd HH:mm:ss" ]
        target       => "@timestamp"
        tag_on_failure => []
      }
    }
  }
}
