# ---------------------------------------------------------------------------
# 80-finalize.conf — Cross-module finalization (runs after all parsing)
#
# By this point @timestamp holds the best available event time (the module
# filters override it from the device's own timestamp when present, otherwise
# it is the ingest time). We mirror it into an ISO8601 string field so the
# Azure output can map it to Log Analytics' `TimeGenerated` column.
# ---------------------------------------------------------------------------

filter {
  # `%{@timestamp}` renders as ISO8601 UTC (e.g. 2026-06-19T12:34:56.000Z),
  # which is exactly what the Azure plugin's time_generated_field expects.
  mutate {
    add_field => { "EventTime" => "%{@timestamp}" }
  }
}
