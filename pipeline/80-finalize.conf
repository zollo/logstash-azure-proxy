# ---------------------------------------------------------------------------
# 80-finalize.conf — Cross-module finalization (runs after all parsing)
#
# By this point @timestamp holds the best available event time (the module
# filters override it from the device's own timestamp when present, otherwise
# it is the ingest time). We mirror it into an ISO8601 string field named
# `TimeGenerated`.
#
# The Microsoft Sentinel output plugin (Logs Ingestion API) has no
# `time_generated_field` option — it ships the event as-is to the Data
# Collection Rule (DCR), whose stream declares a `TimeGenerated` (datetime)
# column. Emitting the field here, named exactly `TimeGenerated`, lets it flow
# straight through the DCR into the Log Analytics `TimeGenerated` column with an
# identity (`source`) transform.
# ---------------------------------------------------------------------------

filter {
  # `%{@timestamp}` renders as ISO8601 UTC (e.g. 2026-06-19T12:34:56.000Z),
  # which the DCR parses into the datetime `TimeGenerated` column.
  mutate {
    add_field => { "TimeGenerated" => "%{@timestamp}" }
  }
}
