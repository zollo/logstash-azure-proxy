# ---------------------------------------------------------------------------
# Main pipeline: HTTP input -> Azure Log Analytics output
#
# All plugin settings that reference ${VAR:default} can be supplied as
# environment variables to the container.
# ---------------------------------------------------------------------------

input {
  http {
    host => "0.0.0.0"
    port => "${HTTP_PORT:8080}"
  }
}

filter {
  # Add pipeline-specific enrichment / parsing here.
}

output {
  microsoft-logstash-output-azure-loganalytics {
    workspace_id          => "${AZURE_WORKSPACE_ID}"
    workspace_key         => "${AZURE_WORKSPACE_KEY}"
    custom_log_table_name => "${AZURE_LOG_TABLE:logstash}"
    plugin_flush_interval => "${AZURE_FLUSH_INTERVAL:5}"
    max_items             => "${AZURE_MAX_ITEMS:2000}"
  }
}
