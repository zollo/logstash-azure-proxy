# ---------------------------------------------------------------------------
# 12-clean.conf — Strip F5 placeholder values
#
# F5 modules (ASM especially) emit literal "N/A" / "-" / empty strings for
# attributes that don't apply to a given event (e.g. `username`,
# `x_forwarded_for_header_value`). Left in place, every downstream KQL query
# has to add `| where username_s != "N/A"`, and the placeholders also pollute
# `arg_max` / `dcount` style aggregations.
#
# Drop those top-level fields here, after classification (so category-defining
# fields are already resolved) and before per-module parsing (so we never split
# a placeholder like "N/A" into a single-element array). Nested objects and the
# @metadata/@timestamp fields are left untouched.
# ---------------------------------------------------------------------------

filter {
  ruby {
    code => '
      event.to_hash.each do |k, v|
        next if k.start_with?("@")
        if v.is_a?(String) && ["N/A", "n/a", "-", ""].include?(v.strip)
          event.remove(k)
        end
      end
    '
    tag_on_exception => "_rubyexception_clean"
  }
}
