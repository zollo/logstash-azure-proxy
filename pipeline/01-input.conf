# ---------------------------------------------------------------------------
# 01-input.conf — HTTP input for F5 BIG-IP Telemetry Streaming
#
# F5 Telemetry Streaming (TS) ships events to this listener using the
# `Generic_HTTP` consumer class (see ts.json.example). Both event-listener
# events (LTM/ASM/AFM/APM/AVR) and System Poller snapshots arrive here as
# JSON over HTTP POST.
#
# The `json` codec decodes each request body. When TS batches multiple events
# into a top-level JSON array, the codec automatically emits one Logstash event
# per array element.
# ---------------------------------------------------------------------------

input {
  http {
    host => "0.0.0.0"
    port => "${HTTP_INPUT_PORT:8080}"
    codec => json
    # Tag everything that comes through this listener so downstream filters can
    # tell F5 telemetry apart from anything else that might POST to the proxy.
    add_field => { "[@metadata][input]" => "f5_telemetry_http" }
    ecs_compatibility => disabled
  }
}
