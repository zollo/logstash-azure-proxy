# ---------------------------------------------------------------------------
# 50-modules-future.conf — Scaffolding for AFM / APM / AVR
#
# These modules are classified and routed to their own Azure tables today (see
# 90-output.conf) so data is never lost. The per-module parsing below is
# intentionally lightweight — it provides a working baseline and a clearly
# marked place to add deeper enrichment as these modules are rolled out.
# ---------------------------------------------------------------------------

filter {

  # ---- AFM (Advanced Firewall Manager) ---------------------------------
  if [@metadata][f5_category] == "AFM" {
    mutate {
      convert => {
        "source_port" => "integer"
        "dest_port"   => "integer"
        "vlan"        => "integer"
      }
    }
    # AFM emits `date_time` like "Dec 12 2018 09:35:51" (single- or
    # double-space padded day).
    if [date_time] {
      date {
        match        => [ "date_time", "MMM dd yyyy HH:mm:ss", "MMM  d yyyy HH:mm:ss" ]
        target       => "@timestamp"
        tag_on_failure => []
      }
    }
    # TODO(AFM): split acl rule chains, enrich action/severity, GeoIP source_ip.
  }

  # ---- APM (Access Policy Manager) -------------------------------------
  if [@metadata][f5_category] == "APM" {
    # APM field names vary by access-policy logging configuration.
    # TODO(APM): normalize Access_Profile / Access_Policy_Result, session fields.
  }

  # ---- AVR (Application Visibility & Reporting) ------------------------
  if [@metadata][f5_category] == "AVR" {
    mutate {
      convert => {
        "AvgCpu"   => "integer"
        "HitCount" => "integer"
        "SlotId"   => "integer"
      }
    }
    if [EOCTimestamp] {
      date {
        match        => [ "EOCTimestamp", "UNIX" ]
        target       => "@timestamp"
        tag_on_failure => []
      }
    }
    # TODO(AVR): map Entity-specific metric fields to typed columns.
  }
}
