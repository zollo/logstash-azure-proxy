# ---------------------------------------------------------------------------
# 90-output.conf — Route each F5 TS category to its own Azure table via a DCR
#
# This container ships to Azure Monitor Logs with the **Microsoft Sentinel**
# output plugin (`microsoft-sentinel-log-analytics-logstash-output-plugin`),
# which uses the modern **Logs Ingestion API**: events are POSTed to a **Data
# Collection Endpoint (DCE)** and routed by a **Data Collection Rule (DCR)**
# into explicitly-typed custom tables. Authentication is via a Microsoft Entra
# ID (Azure AD) service principal — no workspace shared key.
#
# Because every category lands in a different custom table, each is a distinct
# DCR *stream*. All streams live in one DCR (one `dcr_immutable_id`, one DCE),
# so the blocks below differ only by `dcr_stream_name`. The DCR + DCE + tables +
# service principal are provisioned by the Terraform module in `terraform/`,
# whose outputs populate the environment variables referenced here.
#
# Each event already carries a `TimeGenerated` field (set in 80-finalize.conf);
# the DCR stream declares it as a datetime column, so the ingestion-time
# transform is a no-op identity (`source`).
#
# All blocks share the same credentials and batching tunables and feed from the
# single persistent queue, preserving the shock-absorber design.
# ---------------------------------------------------------------------------

output {

  if [@metadata][f5_category] == "LTM" {
    microsoft-sentinel-log-analytics-logstash-output-plugin {
      client_app_Id            => "${AZURE_CLIENT_ID}"
      client_app_secret        => "${AZURE_CLIENT_SECRET}"
      tenant_id                => "${AZURE_TENANT_ID}"
      data_collection_endpoint => "${AZURE_DCE_URI}"
      dcr_immutable_id         => "${AZURE_DCR_IMMUTABLE_ID}"
      dcr_stream_name          => "${AZURE_STREAM_LTM:Custom-F5Telemetry_LTM_CL}"
      plugin_flush_interval    => "${AZURE_FLUSH_INTERVAL:5}"
      retransmission_time      => "${AZURE_RETRANSMISSION_TIME:10}"
      compress_data            => "${AZURE_COMPRESS_DATA:true}"
    }
  }

  else if [@metadata][f5_category] == "ASM" {
    microsoft-sentinel-log-analytics-logstash-output-plugin {
      client_app_Id            => "${AZURE_CLIENT_ID}"
      client_app_secret        => "${AZURE_CLIENT_SECRET}"
      tenant_id                => "${AZURE_TENANT_ID}"
      data_collection_endpoint => "${AZURE_DCE_URI}"
      dcr_immutable_id         => "${AZURE_DCR_IMMUTABLE_ID}"
      dcr_stream_name          => "${AZURE_STREAM_ASM:Custom-F5Telemetry_ASM_CL}"
      plugin_flush_interval    => "${AZURE_FLUSH_INTERVAL:5}"
      retransmission_time      => "${AZURE_RETRANSMISSION_TIME:10}"
      compress_data            => "${AZURE_COMPRESS_DATA:true}"
    }
  }

  else if [@metadata][f5_category] == "systemInfo" {
    microsoft-sentinel-log-analytics-logstash-output-plugin {
      client_app_Id            => "${AZURE_CLIENT_ID}"
      client_app_secret        => "${AZURE_CLIENT_SECRET}"
      tenant_id                => "${AZURE_TENANT_ID}"
      data_collection_endpoint => "${AZURE_DCE_URI}"
      dcr_immutable_id         => "${AZURE_DCR_IMMUTABLE_ID}"
      dcr_stream_name          => "${AZURE_STREAM_SYSTEM:Custom-F5Telemetry_System_CL}"
      plugin_flush_interval    => "${AZURE_FLUSH_INTERVAL:5}"
      retransmission_time      => "${AZURE_RETRANSMISSION_TIME:10}"
      compress_data            => "${AZURE_COMPRESS_DATA:true}"
    }
  }

  # ---- Future modules: routed today, parsed in 50-modules-future.conf ----
  else if [@metadata][f5_category] == "AFM" {
    microsoft-sentinel-log-analytics-logstash-output-plugin {
      client_app_Id            => "${AZURE_CLIENT_ID}"
      client_app_secret        => "${AZURE_CLIENT_SECRET}"
      tenant_id                => "${AZURE_TENANT_ID}"
      data_collection_endpoint => "${AZURE_DCE_URI}"
      dcr_immutable_id         => "${AZURE_DCR_IMMUTABLE_ID}"
      dcr_stream_name          => "${AZURE_STREAM_AFM:Custom-F5Telemetry_AFM_CL}"
      plugin_flush_interval    => "${AZURE_FLUSH_INTERVAL:5}"
      retransmission_time      => "${AZURE_RETRANSMISSION_TIME:10}"
      compress_data            => "${AZURE_COMPRESS_DATA:true}"
    }
  }

  else if [@metadata][f5_category] == "APM" {
    microsoft-sentinel-log-analytics-logstash-output-plugin {
      client_app_Id            => "${AZURE_CLIENT_ID}"
      client_app_secret        => "${AZURE_CLIENT_SECRET}"
      tenant_id                => "${AZURE_TENANT_ID}"
      data_collection_endpoint => "${AZURE_DCE_URI}"
      dcr_immutable_id         => "${AZURE_DCR_IMMUTABLE_ID}"
      dcr_stream_name          => "${AZURE_STREAM_APM:Custom-F5Telemetry_APM_CL}"
      plugin_flush_interval    => "${AZURE_FLUSH_INTERVAL:5}"
      retransmission_time      => "${AZURE_RETRANSMISSION_TIME:10}"
      compress_data            => "${AZURE_COMPRESS_DATA:true}"
    }
  }

  else if [@metadata][f5_category] == "AVR" {
    microsoft-sentinel-log-analytics-logstash-output-plugin {
      client_app_Id            => "${AZURE_CLIENT_ID}"
      client_app_secret        => "${AZURE_CLIENT_SECRET}"
      tenant_id                => "${AZURE_TENANT_ID}"
      data_collection_endpoint => "${AZURE_DCE_URI}"
      dcr_immutable_id         => "${AZURE_DCR_IMMUTABLE_ID}"
      dcr_stream_name          => "${AZURE_STREAM_AVR:Custom-F5Telemetry_AVR_CL}"
      plugin_flush_interval    => "${AZURE_FLUSH_INTERVAL:5}"
      retransmission_time      => "${AZURE_RETRANSMISSION_TIME:10}"
      compress_data            => "${AZURE_COMPRESS_DATA:true}"
    }
  }

  # ---- Fallback: anything unclassified (keeps the proxy general-purpose) ----
  else {
    microsoft-sentinel-log-analytics-logstash-output-plugin {
      client_app_Id            => "${AZURE_CLIENT_ID}"
      client_app_secret        => "${AZURE_CLIENT_SECRET}"
      tenant_id                => "${AZURE_TENANT_ID}"
      data_collection_endpoint => "${AZURE_DCE_URI}"
      dcr_immutable_id         => "${AZURE_DCR_IMMUTABLE_ID}"
      dcr_stream_name          => "${AZURE_STREAM_EVENT:Custom-F5Telemetry_Event_CL}"
      plugin_flush_interval    => "${AZURE_FLUSH_INTERVAL:5}"
      retransmission_time      => "${AZURE_RETRANSMISSION_TIME:10}"
      compress_data            => "${AZURE_COMPRESS_DATA:true}"
    }
  }

  # Optional console echo for local debugging. Enable by setting
  # DEBUG_STDOUT=true in the container environment.
  if "${DEBUG_STDOUT:false}" == "true" {
    stdout { codec => rubydebug { metadata => true } }
  }
}
