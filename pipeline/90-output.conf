# ---------------------------------------------------------------------------
# 90-output.conf — Route each F5 TS category to its own Azure table
#
# The microsoft-logstash-output-azure-loganalytics plugin does NOT support
# field/sprintf references in `custom_log_table_name`, so we cannot build the
# table name dynamically from the event. Instead we branch on the resolved
# category and use one output per module, each with its own env-overridable
# (static) table name. Azure appends the `_CL` suffix automatically, so e.g.
# `F5Telemetry_LTM` becomes the `F5Telemetry_LTM_CL` custom log table.
#
# All blocks share the same workspace credentials and batching tunables and
# feed from the single persistent queue, preserving the shock-absorber design.
# ---------------------------------------------------------------------------

output {

  if [@metadata][f5_category] == "LTM" {
    microsoft-logstash-output-azure-loganalytics {
      workspace_id          => "${AZURE_WORKSPACE_ID}"
      workspace_key         => "${AZURE_WORKSPACE_KEY}"
      custom_log_table_name => "${AZURE_TABLE_LTM:F5Telemetry_LTM}"
      time_generated_field  => "EventTime"
      plugin_flush_interval => "${AZURE_FLUSH_INTERVAL:5}"
      max_items             => "${AZURE_MAX_ITEMS:2000}"
    }
  }

  else if [@metadata][f5_category] == "ASM" {
    microsoft-logstash-output-azure-loganalytics {
      workspace_id          => "${AZURE_WORKSPACE_ID}"
      workspace_key         => "${AZURE_WORKSPACE_KEY}"
      custom_log_table_name => "${AZURE_TABLE_ASM:F5Telemetry_ASM}"
      time_generated_field  => "EventTime"
      plugin_flush_interval => "${AZURE_FLUSH_INTERVAL:5}"
      max_items             => "${AZURE_MAX_ITEMS:2000}"
    }
  }

  else if [@metadata][f5_category] == "systemInfo" {
    microsoft-logstash-output-azure-loganalytics {
      workspace_id          => "${AZURE_WORKSPACE_ID}"
      workspace_key         => "${AZURE_WORKSPACE_KEY}"
      custom_log_table_name => "${AZURE_TABLE_SYSTEM:F5Telemetry_System}"
      time_generated_field  => "EventTime"
      plugin_flush_interval => "${AZURE_FLUSH_INTERVAL:5}"
      max_items             => "${AZURE_MAX_ITEMS:2000}"
    }
  }

  # ---- Future modules: routed today, parsed in 50-modules-future.conf ----
  else if [@metadata][f5_category] == "AFM" {
    microsoft-logstash-output-azure-loganalytics {
      workspace_id          => "${AZURE_WORKSPACE_ID}"
      workspace_key         => "${AZURE_WORKSPACE_KEY}"
      custom_log_table_name => "${AZURE_TABLE_AFM:F5Telemetry_AFM}"
      time_generated_field  => "EventTime"
      plugin_flush_interval => "${AZURE_FLUSH_INTERVAL:5}"
      max_items             => "${AZURE_MAX_ITEMS:2000}"
    }
  }

  else if [@metadata][f5_category] == "APM" {
    microsoft-logstash-output-azure-loganalytics {
      workspace_id          => "${AZURE_WORKSPACE_ID}"
      workspace_key         => "${AZURE_WORKSPACE_KEY}"
      custom_log_table_name => "${AZURE_TABLE_APM:F5Telemetry_APM}"
      time_generated_field  => "EventTime"
      plugin_flush_interval => "${AZURE_FLUSH_INTERVAL:5}"
      max_items             => "${AZURE_MAX_ITEMS:2000}"
    }
  }

  else if [@metadata][f5_category] == "AVR" {
    microsoft-logstash-output-azure-loganalytics {
      workspace_id          => "${AZURE_WORKSPACE_ID}"
      workspace_key         => "${AZURE_WORKSPACE_KEY}"
      custom_log_table_name => "${AZURE_TABLE_AVR:F5Telemetry_AVR}"
      time_generated_field  => "EventTime"
      plugin_flush_interval => "${AZURE_FLUSH_INTERVAL:5}"
      max_items             => "${AZURE_MAX_ITEMS:2000}"
    }
  }

  # ---- Fallback: anything unclassified (keeps the proxy general-purpose) ----
  else {
    microsoft-logstash-output-azure-loganalytics {
      workspace_id          => "${AZURE_WORKSPACE_ID}"
      workspace_key         => "${AZURE_WORKSPACE_KEY}"
      custom_log_table_name => "${AZURE_LOG_TABLE:F5Telemetry_Event}"
      time_generated_field  => "EventTime"
      plugin_flush_interval => "${AZURE_FLUSH_INTERVAL:5}"
      max_items             => "${AZURE_MAX_ITEMS:2000}"
    }
  }

  # Optional console echo for local debugging. Enable by setting
  # DEBUG_STDOUT=true in the container environment.
  if "${DEBUG_STDOUT:false}" == "true" {
    stdout { codec => rubydebug { metadata => true } }
  }
}
