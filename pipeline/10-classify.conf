# ---------------------------------------------------------------------------
# 10-classify.conf — Classify every event into an F5 TS category
#
# F5 Telemetry Streaming stamps event-listener events with a
# `telemetryEventCategory` field (LTM, ASM, AFM, APM, AVR, systemInfo, ...).
# When that field is missing (older TS versions, raw forwarders, or generic
# clients) we infer the category from the shape of the document.
#
# The resolved category is stored in `[@metadata][f5_category]` (used for
# routing and per-module parsing) and mirrored to the flat, queryable field
# `f5_telemetry_category` that is shipped to Azure Log Analytics.
# ---------------------------------------------------------------------------

filter {

  # Some forwarders wrap the JSON payload inside a "message" string instead of
  # sending it as the request body. Parse it back out when that happens.
  if [message] and ![telemetryEventCategory] {
    json {
      source => "message"
      skip_on_invalid_json => true
    }
  }

  # ---- Resolve the event category --------------------------------------
  if [telemetryEventCategory] {
    mutate { add_field => { "[@metadata][f5_category]" => "%{telemetryEventCategory}" } }
  }
  else if [event_source] == "request_logging" {
    mutate { add_field => { "[@metadata][f5_category]" => "LTM" } }
  }
  else if [system] {
    mutate { add_field => { "[@metadata][f5_category]" => "systemInfo" } }
  }
  else if [support_id] and [policy_name] {
    mutate { add_field => { "[@metadata][f5_category]" => "ASM" } }
  }
  else if [acl_policy_name] or [acl_rule_name] {
    mutate { add_field => { "[@metadata][f5_category]" => "AFM" } }
  }
  else if [Access_Profile] or [Access_Policy_Result] {
    mutate { add_field => { "[@metadata][f5_category]" => "APM" } }
  }
  else {
    # Anything we cannot positively identify is treated as a generic event so
    # it is never silently dropped.
    mutate { add_field => { "[@metadata][f5_category]" => "event" } }
  }

  # ---- Common enrichment -----------------------------------------------
  # Flat, KQL-friendly fields that exist on every document regardless of module.
  mutate {
    add_field => {
      "f5_telemetry_category" => "%{[@metadata][f5_category]}"
      "f5_collector"          => "logstash-azure-proxy"
    }
  }

  # Normalize the originating device hostname across modules. Event-listener
  # events use `hostname`; System Poller nests it under `system.hostname`.
  if [hostname] {
    mutate { add_field => { "f5_device_hostname" => "%{hostname}" } }
  } else if [system][hostname] {
    mutate { add_field => { "f5_device_hostname" => "%{[system][hostname]}" } }
  }
}
