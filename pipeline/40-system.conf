# ---------------------------------------------------------------------------
# 40-system.conf — System Poller snapshots (telemetryEventCategory: systemInfo)
#
# System Poller documents are large, deeply nested JSON snapshots (system,
# virtualServers, pools, profiles, ...). We keep the full structure intact for
# Azure but promote a handful of high-value device attributes to flat,
# top-level fields so they are trivial to filter on in KQL.
# ---------------------------------------------------------------------------

filter {
  if [@metadata][f5_category] == "systemInfo" {

    # Promote frequently-queried device attributes to the top level.
    if [system][version]        { mutate { add_field => { "f5_device_version"  => "%{[system][version]}" } } }
    if [system][machineId]      { mutate { add_field => { "f5_device_machineId" => "%{[system][machineId]}" } } }
    if [system][failoverStatus] { mutate { add_field => { "f5_device_failoverStatus" => "%{[system][failoverStatus]}" } } }
    if [system][syncStatus]     { mutate { add_field => { "f5_device_syncStatus" => "%{[system][syncStatus]}" } } }

    # Promote the headline saturation metrics as NUMBERS so they land in Azure
    # as `_d` columns (e.g. f5_device_cpu_d) that can be charted and alerted on
    # directly — no parse_json(system_s) required. These drive the device
    # saturation panel/alert in azure/.
    if [system][cpu]       { mutate { add_field => { "f5_device_cpu"        => "%{[system][cpu]}" } } }
    if [system][memory]    { mutate { add_field => { "f5_device_memory"     => "%{[system][memory]}" } } }
    if [system][tmmCpu]    { mutate { add_field => { "f5_device_tmm_cpu"    => "%{[system][tmmCpu]}" } } }
    if [system][tmmMemory] { mutate { add_field => { "f5_device_tmm_memory" => "%{[system][tmmMemory]}" } } }
    mutate {
      convert => {
        "f5_device_cpu"        => "integer"
        "f5_device_memory"     => "integer"
        "f5_device_tmm_cpu"    => "integer"
        "f5_device_tmm_memory" => "integer"
      }
    }

    # Use the snapshot time the BIG-IP reported as the event time.
    if [system][systemTimestamp] {
      date {
        match        => [ "[system][systemTimestamp]", "ISO8601" ]
        target       => "@timestamp"
        tag_on_failure => []
      }
    }
  }
}
