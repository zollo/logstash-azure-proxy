# ---------------------------------------------------------------------------
# 20-ltm.conf — LTM (Local Traffic Manager) request logs
#
# LTM request-log fields are defined by the BIG-IP request-logging / HSL
# profile (configured via AS3 or TMSH), so the exact set varies per
# deployment. The conversions below target the field names emitted by the
# stock F5 TS request-logging examples and are no-ops when a field is absent.
# ---------------------------------------------------------------------------

filter {
  if [@metadata][f5_category] == "LTM" {

    # Coerce the common numeric request/response attributes so they land in
    # Azure as numbers (suffixed `_d`) rather than strings.
    mutate {
      convert => {
        "client_port"   => "integer"
        "server_port"   => "integer"
        "response_ms"   => "integer"
        "response_size" => "integer"
        "request_size"  => "integer"
        "response_code" => "integer"
        "protocol_id"   => "integer"
      }
    }

    # Derive a coarse HTTP status class once, here, so every dashboard panel and
    # alert can filter on `response_code_class_s` instead of re-deriving the
    # 5xx/4xx buckets from `response_code_d` in each query.
    if [response_code] {
      if [response_code] >= 500 {
        mutate { add_field => { "response_code_class" => "5xx" } }
      } else if [response_code] >= 400 {
        mutate { add_field => { "response_code_class" => "4xx" } }
      } else if [response_code] >= 300 {
        mutate { add_field => { "response_code_class" => "3xx" } }
      } else if [response_code] >= 200 {
        mutate { add_field => { "response_code_class" => "2xx" } }
      } else if [response_code] >= 100 {
        mutate { add_field => { "response_code_class" => "1xx" } }
      }
    }

    # Prefer the event's own timestamp for @timestamp when present; otherwise
    # the ingest time (set by the input) is retained. Failures are silent so we
    # never tag well-formed events with _dateparsefailure.
    if [event_timestamp] {
      date {
        match        => [ "event_timestamp", "ISO8601" ]
        target       => "@timestamp"
        tag_on_failure => []
      }
    }
  }
}
