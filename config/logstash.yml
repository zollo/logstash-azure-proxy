# ---------------------------------------------------------------------------
# logstash.yml
#
# Environment-variable references use the ${VAR:default} syntax, so every value
# below falls back to a sensible default when the variable is not supplied to
# the container.
# ---------------------------------------------------------------------------

node.name: "${LS_NODE_NAME:logstash-azure-proxy}"

# Bind the monitoring / metrics HTTP API to all interfaces so health checks and
# external monitoring can reach it.
api.http.host: "0.0.0.0"
api.http.port: 9600

# The Azure Log Analytics output plugin recommends disabling ECS on Logstash 8.
pipeline.ecs_compatibility: disabled

# ---------------------------------------------------------------------------
# Persistent Queues
#
#   path.queue       -> override with the LS_QUEUE_PATH env var
#   queue.max_bytes  -> override with the LS_QUEUE_MAX_BYTES env var
# ---------------------------------------------------------------------------
queue.type: persisted
path.queue: "${LS_QUEUE_PATH:/var/lib/logstash/queue}"
queue.max_bytes: "${LS_QUEUE_MAX_BYTES:60gb}"

# Flush the durable write-ahead checkpoint on every write for maximum
# durability of the persistent queue.
queue.checkpoint.writes: 1

# ---------------------------------------------------------------------------
# Dead Letter Queue (DLQ)
#
# Events that a plugin cannot process (e.g. a mapping/serialization failure on
# the way to Azure) are written here instead of being silently dropped — which
# preserves the project's "never lose data" guarantee end to end. The `dlq`
# pipeline (see pipelines.yml + dlq/dlq.conf) drains this directory and ships
# the dead events to the F5Telemetry_DLQ_CL table so they are visible and
# recoverable rather than aging out at `dead_letter_queue.max_bytes`.
#
# NOTE: the DLQ only receives events from plugins that implement the DLQ API
# and from pipeline-level mapping errors; it is a safety net, not a catch-all.
# Keep it on a persisted volume (LS_DLQ_PATH) so it survives restarts.
# ---------------------------------------------------------------------------
dead_letter_queue.enable: true
path.dead_letter_queue: "${LS_DLQ_PATH:/var/lib/logstash/dlq}"
dead_letter_queue.max_bytes: "${LS_DLQ_MAX_BYTES:1gb}"
