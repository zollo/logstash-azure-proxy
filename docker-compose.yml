# ---------------------------------------------------------------------------
# Production docker-compose for logstash-azure-proxy
#
# CPU / memory allocation and all runtime tunables are driven by environment
# variables (see .env.example).  Compose substitutes ${VAR:-default}, so the
# stack runs with sane defaults out of the box.
#
#   docker compose up -d
# ---------------------------------------------------------------------------

services:
  logstash:
    image: ${IMAGE:-ghcr.io/zollo/logstash-azure-proxy}:${IMAGE_TAG:-latest}
    # Build locally when the image is not pulled from the registry.
    build:
      context: .
      args:
        LOGSTASH_VERSION: ${LOGSTASH_VERSION:-8.11.4}
    container_name: logstash-azure-proxy
    restart: unless-stopped

    environment:
      # --- Persistent queue (defaults baked into the image) ---------------
      LS_QUEUE_PATH: ${LS_QUEUE_PATH:-/var/lib/logstash/queue}
      LS_QUEUE_MAX_BYTES: ${LS_QUEUE_MAX_BYTES:-60gb}

      # --- Dead Letter Queue ----------------------------------------------
      LS_DLQ_PATH: ${LS_DLQ_PATH:-/var/lib/logstash/dlq}
      LS_DLQ_MAX_BYTES: ${LS_DLQ_MAX_BYTES:-1gb}

      # --- HTTP input -----------------------------------------------------
      # NOTE: do NOT name this HTTP_PORT — Logstash maps that env var onto its
      # http.port setting, which collides with api.http.port (the LS API port).
      HTTP_INPUT_PORT: ${HTTP_INPUT_PORT:-8080}

      # --- JVM heap: a majority (75%) of the container memory limit -------
      LS_JAVA_OPTS: ${LS_JAVA_OPTS:--XX:InitialRAMPercentage=75 -XX:MinRAMPercentage=75 -XX:MaxRAMPercentage=75}

      # --- Azure Log Analytics output ------------------------------------
      AZURE_WORKSPACE_ID: ${AZURE_WORKSPACE_ID:?AZURE_WORKSPACE_ID is required}
      AZURE_WORKSPACE_KEY: ${AZURE_WORKSPACE_KEY:?AZURE_WORKSPACE_KEY is required}
      AZURE_FLUSH_INTERVAL: ${AZURE_FLUSH_INTERVAL:-5}
      AZURE_MAX_ITEMS: ${AZURE_MAX_ITEMS:-2000}

      # --- F5 Telemetry Streaming -> per-category Azure tables ------------
      AZURE_TABLE_LTM: ${AZURE_TABLE_LTM:-F5Telemetry_LTM}
      AZURE_TABLE_ASM: ${AZURE_TABLE_ASM:-F5Telemetry_ASM}
      AZURE_TABLE_SYSTEM: ${AZURE_TABLE_SYSTEM:-F5Telemetry_System}
      AZURE_TABLE_AFM: ${AZURE_TABLE_AFM:-F5Telemetry_AFM}
      AZURE_TABLE_APM: ${AZURE_TABLE_APM:-F5Telemetry_APM}
      AZURE_TABLE_AVR: ${AZURE_TABLE_AVR:-F5Telemetry_AVR}
      # Fallback table for unclassified events.
      AZURE_LOG_TABLE: ${AZURE_LOG_TABLE:-F5Telemetry_Event}
      # Table for events that could not be processed (drained from the DLQ).
      AZURE_TABLE_DLQ: ${AZURE_TABLE_DLQ:-F5Telemetry_DLQ}

      # --- Debugging -----------------------------------------------------
      DEBUG_STDOUT: ${DEBUG_STDOUT:-false}

    ports:
      - "${HTTP_INPUT_PORT:-8080}:8080"   # HTTP input
      - "${API_PORT:-9600}:9600"    # Logstash monitoring API

    volumes:
      # Durable storage for the persistent queue.
      - logstash-queue:${LS_QUEUE_PATH:-/var/lib/logstash/queue}
      # Durable storage for the Dead Letter Queue.
      - logstash-dlq:${LS_DLQ_PATH:-/var/lib/logstash/dlq}
      # Pre-built configuration mounted read-only so it can be tuned without
      # rebuilding the image.
      - ./config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      - ./config/pipelines.yml:/usr/share/logstash/config/pipelines.yml:ro
      - ./pipeline:/usr/share/logstash/pipeline:ro
      - ./dlq:/usr/share/logstash/dlq:ro

    # ---------------------------------------------------------------------
    # Dynamic CPU / memory allocation.  Honored by Compose v2 for
    # `docker compose up`; the memory limit also becomes the cgroup limit the
    # JVM reads to compute its 75% heap.
    # ---------------------------------------------------------------------
    deploy:
      resources:
        limits:
          cpus: "${LS_CPU_LIMIT:-2}"
          memory: ${LS_MEM_LIMIT:-4g}
        reservations:
          cpus: "${LS_CPU_RESERVATION:-1}"
          memory: ${LS_MEM_RESERVATION:-2g}

    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9600/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  logstash-queue:
    driver: local
  logstash-dlq:
    driver: local
