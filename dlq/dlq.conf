# ---------------------------------------------------------------------------
# dlq/dlq.conf — Dead Letter Queue drain pipeline
#
# Reads events that the main `f5-telemetry` pipeline could not process (written
# to the DLQ configured in config/logstash.yml) and ships them to a dedicated
# Azure table, F5Telemetry_DLQ_CL, annotated with WHY they failed. This turns a
# silent drop into a queryable, recoverable record — an SRE can alert on a
# non-zero DLQ table and inspect the original payload and failure reason.
# ---------------------------------------------------------------------------

input {
  dead_letter_queue {
    path           => "${LS_DLQ_PATH:/var/lib/logstash/dlq}"
    pipeline_id    => "f5-telemetry"
    commit_offsets => true
  }
}

filter {
  # Surface the DLQ metadata (set by Logstash) as flat, queryable fields.
  mutate {
    add_field => {
      "f5_dlq_reason"    => "%{[@metadata][dead_letter_queue][reason]}"
      "f5_dlq_plugin_id" => "%{[@metadata][dead_letter_queue][plugin_id]}"
      "f5_dlq_entry_time"=> "%{[@metadata][dead_letter_queue][entry_time]}"
      "f5_collector"     => "logstash-azure-proxy-dlq"
    }
  }
  mutate { add_field => { "EventTime" => "%{@timestamp}" } }
}

output {
  microsoft-logstash-output-azure-loganalytics {
    workspace_id          => "${AZURE_WORKSPACE_ID}"
    workspace_key         => "${AZURE_WORKSPACE_KEY}"
    custom_log_table_name => "${AZURE_TABLE_DLQ:F5Telemetry_DLQ}"
    time_generated_field  => "EventTime"
    plugin_flush_interval => "${AZURE_FLUSH_INTERVAL:5}"
    max_items             => "${AZURE_MAX_ITEMS:2000}"
  }

  if "${DEBUG_STDOUT:false}" == "true" {
    stdout { codec => rubydebug { metadata => true } }
  }
}
